server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
