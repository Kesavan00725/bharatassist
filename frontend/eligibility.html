<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BharatAssist – Eligibility</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>BharatAssist</h1>
            <p>Eligibility Checker + Document Verification</p>
          </div>
        </div>
        <nav>
          <a href="./index.html">Home</a>
          <a href="./chat.html">Chat</a>
        </nav>
      </header>

      <div class="grid cols-2">
        <section class="card">
          <h2>Eligibility Checker</h2>
          <p class="hint">Fill what you know. Missing fields may reduce matches.</p>

          <div class="row cols-3">
            <div>
              <label for="age">Age</label>
              <input id="age" type="number" min="0" max="120" placeholder="e.g. 35" />
            </div>
            <div>
              <label for="income">Annual Income (INR)</label>
              <input id="income" type="number" min="0" placeholder="e.g. 200000" />
            </div>
            <div>
              <label for="state">State</label>
              <input id="state" placeholder="e.g. Tamil Nadu" />
            </div>
          </div>

          <div class="row cols-3" style="margin-top: 10px;">
            <div>
              <label for="category">Category</label>
              <select id="category">
                <option value="">(optional)</option>
                <option value="general">General</option>
                <option value="obc">OBC</option>
                <option value="sc">SC</option>
                <option value="st">ST</option>
                <option value="ews">EWS</option>
              </select>
            </div>
            <div>
              <label for="gender">Gender</label>
              <select id="gender">
                <option value="">(optional)</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <label for="occupation">Occupation</label>
              <input id="occupation" placeholder="e.g. farmer" />
            </div>
          </div>

          <div class="row" style="margin-top: 10px;">
            <div>
              <label>
                <input id="isDisabled" type="checkbox" />
                &nbsp;Person with disability (optional)
              </label>
            </div>
          </div>

          <div class="row" style="margin-top: 10px;">
            <div>
              <label>
                <input id="isRural" type="checkbox" />
                &nbsp;Rural area (optional)
              </label>
            </div>
          </div>

          <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button id="checkBtn" class="btn">Check eligibility</button>
            <button id="loadSchemesBtn" class="btn secondary">Load schemes list</button>
          </div>

          <div id="bestMatchContainer" style="margin-top: 20px;"></div>

          <div class="grid" style="margin-top: 14px;">
            <div class="card" style="padding: 12px;">
              <h2 style="margin-bottom: 6px;">Eligible</h2>
              <div id="eligibleList" class="list"></div>
            </div>
            <div class="card" style="padding: 12px;">
              <h2 style="margin-bottom: 6px;">Not eligible</h2>
              <div id="notEligibleList" class="list"></div>
            </div>
          </div>
        </section>

        <aside class="card">
          <h2>Document Verification (simple)</h2>
          <p class="hint">Pick a scheme ID, list what documents you have, and optionally upload a PDF for keyword scan.</p>

          <div class="row">
            <div>
              <label for="schemeId">Scheme ID</label>
              <input id="schemeId" placeholder="e.g. pm-kisan" />
            </div>
            <div>
              <label for="declaredDocs">Documents you have (comma separated)</label>
              <input id="declaredDocs" placeholder="Aadhaar, Bank Passbook, Land Record" />
            </div>
            <div>
              <label for="pdfFile">PDF (optional)</label>
              <input id="pdfFile" type="file" accept="application/pdf" />
            </div>
          </div>

          <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button id="verifyBtn" class="btn">Verify</button>
          </div>

          <div id="verifyOut" class="scheme" style="margin-top: 14px; display: none;"></div>
        </aside>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
